# Captive-portal DNS overrides for the Sahar-Connect hotspot.
#
# Install to: /etc/NetworkManager/dnsmasq-shared.d/sahar-captive.conf
# (NetworkManager's "shared" mode reads drop-ins from that directory.)
#
# Points each OS's connectivity-check domain at this edge node (10.42.0.1) so
# the captive_server.py responder can answer them and the phone keeps the
# hotspot connected even with the uplink unplugged.
address=/captive.apple.com/10.42.0.1
address=/connectivitycheck.gstatic.com/10.42.0.1
address=/connectivitycheck.android.com/10.42.0.1
address=/clients3.google.com/10.42.0.1
address=/www.msftconnecttest.com/10.42.0.1
